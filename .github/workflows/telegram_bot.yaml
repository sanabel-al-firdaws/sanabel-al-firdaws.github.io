name: Telegram bot
on:
  telegram_bot:
    event: text
    token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
# multiple message types

jobs:
  name: Actionsflow Action
  # You may pin to the exact commit or the version.
  # uses: actionsflow/actionsflow-action@877881186c58832926cbd76fb5674561749f7256
  uses: actionsflow/actionsflow-action@v1
  # with:
  #   # 
  #   using: # optional, default is auto
  #   # actionsflow CLI command, the default value is `build`, you can specify it like `build --verbose`
  #   args: # optional, default is build
  #   # secrets context in json format
  #   json-secrets: # optional, default is 
  #   # github context in json format
  #   json-github: # optional, default is 
          

   fetch:
    runs-on: ubuntu-latest
    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write
    concurrency:
      group: fetching
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest # or "latest", "canary", <sha>

          # cache-dependency-path: package-lock.json
      - name: Install Dependency
        run: bun install 
      - name: Download files
        run:  bun ./scripts/docs-to-md.js
        env:
          GOOGLE_DOCS_ACCESS: ${{ secrets.GOOGLE_DOCS_ACCESS }}
          GOOGLE_DOCS_REFRESH: ${{ secrets.GOOGLE_DOCS_REFRESH }}
          GOOGLE_DOCS_CLIENT_ID: ${{ secrets.GOOGLE_DOCS_CLIENT_ID }}
          GOOGLE_DOCS_CLIENT_SECRET: ${{ secrets.GOOGLE_DOCS_CLIENT_SECRET }}
      - name: Commit new data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Google Docs files"
          commit_user_name: GitHub Actions
          commit_user_email: actions@github.com
          commit_author: GitHub Actions <actions@github.com>
