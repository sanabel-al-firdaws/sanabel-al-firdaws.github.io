name: Deploy to GitHub Pages

on:
  # push:
  #     branches: [ main ]
  #  paths:
  # - 'src/content/docs/_run.md'

  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  # push:

  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    concurrency:
      group: building
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
  
# rename 's/\.html$/\.txt/' *.html
      # - name: rename files
      #   run: npm run rename
      - name: Checkout your repository using git
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go install oss.terrastruct.com/d2@latest

      - name: Install, build, and upload your site
        uses: withastro/action@v2
        with:
          # path: . # The root location of your Astro project inside the repository. (optional)
          node-version: 22 # The specific version of Node that should be used to build your site. Defaults to 18. (optional)
          package-manager: bun@latest # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
